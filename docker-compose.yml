version: '3.8'
services:
  proxy_pool:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data          # 持久化代理列表
      - ./config.yaml:/app/config.yaml  # 挂载配置
    environment:
      - PROXY_POOL_DATA_DIR=/app/data
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3